name = "ai-avoid-pit"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# ===== 环境变量 =====
[vars]
DEEPSEEK_BASE_URL = "https://api.deepseek.com"
# ⚠️ DEEPSEEK_API_KEY 请通过 Cloudflare Dashboard → Secrets 设置，不要写在这里！
# 本地开发请在 worker/.dev.vars 中设置

# ===== D1 数据库 (搜索日志、曝光帖、用户提交) =====
[[d1_databases]]
binding = "DB"
database_name = "wq-data"
database_id = "7510eda1-725c-42fa-b1a4-8e62ee321083"

# ===== Vectorize 向量索引 (RAG 语义检索) =====
[[vectorize]]
binding = "KNOWLEDGE_VECTOR"
index_name = "knowledge-vectors"

# ===== R2 存储桶 (图片代理缓存) - 暂未启用 =====
# [[r2_buckets]]
# binding = "IMAGE_CACHE"
# bucket_name = "image-cache"

# ===== AI 绑定（Workers AI）=====
[ai]
binding = "AI"

# ===== Cron 定时触发器 (每天凌晨 3 点扫描高频未覆盖商品) =====
[triggers]
crons = ["0 3 * * *"]

# ===== 可选的 dev 环境配置 =====
[env.dev]
name = "ai-avoid-pit-dev"

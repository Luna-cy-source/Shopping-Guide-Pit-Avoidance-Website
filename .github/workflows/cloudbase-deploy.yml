name: 部署到 CloudBase 静态托管

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: 安装依赖
        working-directory: frontend
        run: npm install

      - name: 构建项目
        working-directory: frontend
        run: npm run build

      - name: 部署到 CloudBase 静态托管
        uses: TencentCloudBase/cloudbase-action@v2
        with:
          secretId: ${{ secrets.TCB_SECRET_ID }}
          secretKey: ${{ secrets.TCB_SECRET_KEY }}
          envId: pit-avoidance-d3gx1xj3j622007d9
          staticSrcPath: frontend/out
